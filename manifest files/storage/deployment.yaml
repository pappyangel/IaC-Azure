apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-storage-deployment
  labels:
    app: aks-storage
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aks-storage
  template:
    metadata:
      labels:
        app: aks-storage
    spec:
      containers:
        - name: aks-storage
          image: jfvacr.azurecr.io/storage-app-image:latest} # Update with your ACR login server and image tag
          ports:
            - containerPort: 8080         
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"